{% extends "base.html" %}
{% block title %}{{ tool.name }} · 工具箱{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-4">
            <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
                <div>
                    <h2 class="mb-2">{{ tool.name }}</h2>
                    <p class="text-muted mb-0">{{ tool.description }}</p>
                </div>
                <div class="text-end">
                    <div class="d-flex gap-4 justify-content-end flex-wrap">
                        <div>
                            <div class="text-muted small">本地时间</div>
                            <div id="localTime" class="fw-semibold" style="font-size: 1.15rem; color: #1a2634;"></div>
                            <div id="localDate" class="text-muted small"></div>
                        </div>
                        <div>
                            <div class="text-muted small">UTC 标准时间</div>
                            <div id="utcTime" class="fw-semibold" style="font-size: 1.15rem; color: #1a2634;"></div>
                            <div id="utcDate" class="text-muted small"></div>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="my-4" style="opacity: 0.08;">

            <div class="row g-3 align-items-end mb-3">
                <div class="col-md-6">
                    <label for="filterInput" class="form-label fw-medium">搜索</label>
                    <input id="filterInput" class="form-control" placeholder="输入城市/地区，例如：东京、纽约、伦敦">
                </div>
                <div class="col-md-6 d-flex gap-2 justify-content-md-end">
                    <button id="toggleSecondsBtn" class="btn btn-secondary">显示秒</button>
                    <button id="resetBtn" class="btn btn-outline-secondary">重置</button>
                </div>
            </div>

            <div id="clockGrid" class="row g-3"></div>

            <div class="mt-3 text-muted small">
                提示：时间计算在浏览器本地完成，依赖系统/浏览器对 IANA 时区的支持。
            </div>
        </div>
    </div>
</div>

<script>
const ZONES = [
    { label: '洛杉矶（Pacific）', tz: 'America/Los_Angeles' },
    { label: '纽约（Eastern）', tz: 'America/New_York' },
    { label: '伦敦（GMT）', tz: 'Europe/London' },
    { label: '巴黎（CET）', tz: 'Europe/Paris' },
    { label: '开罗（EET）', tz: 'Africa/Cairo' },
    { label: '迪拜（GST）', tz: 'Asia/Dubai' },
    { label: '孟买（IST）', tz: 'Asia/Kolkata' },
    { label: '曼谷（ICT）', tz: 'Asia/Bangkok' },
    { label: '新加坡（SGT）', tz: 'Asia/Singapore' },
    { label: '香港（HKT）', tz: 'Asia/Hong_Kong' },
    { label: '东京（JST）', tz: 'Asia/Tokyo' },
    { label: '悉尼（AEST）', tz: 'Australia/Sydney' },
    { label: '奥克兰（NZST）', tz: 'Pacific/Auckland' },
];

let showSeconds = false;
let timer = null;
let filterText = '';
const tzSupportCache = new Map();

function escapeHtml(str) {
    return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

function supportsTimeZone(tz) {
    if (tzSupportCache.has(tz)) return tzSupportCache.get(tz);
    try {
        new Intl.DateTimeFormat('zh-CN', { timeZone: tz }).format(new Date());
        tzSupportCache.set(tz, true);
        return true;
    } catch (e) {
        tzSupportCache.set(tz, false);
        return false;
    }
}

function tryGetOffsetLabel(now, tz) {
    // Prefer "shortOffset" (e.g. GMT+08:00). Fallback to "short" where needed.
    const tryOptions = [
        { locale: 'en-US', options: { timeZone: tz, timeZoneName: 'shortOffset', hour: '2-digit', minute: '2-digit', hour12: false } },
        { locale: 'en-US', options: { timeZone: tz, timeZoneName: 'short', hour: '2-digit', minute: '2-digit', hour12: false } },
        { locale: 'zh-CN', options: { timeZone: tz, timeZoneName: 'short', hour: '2-digit', minute: '2-digit', hour12: false } },
    ];
    for (const item of tryOptions) {
        try {
            const parts = new Intl.DateTimeFormat(item.locale, item.options).formatToParts(now);
            const tzName = parts.find(p => p.type === 'timeZoneName')?.value || '';
            if (!tzName) continue;
            // Normalize: GMT -> UTC (user asked for "GTM+8" style)
            const normalized = tzName.replace('GMT', 'UTC');
            // Keep only offset-style results (UTC+8 / UTC+08:00 / UTC-04:00 etc.)
            if (/UTC[+-]\d/.test(normalized) || /UTC[+-]\d{2}:?\d{0,2}/.test(normalized)) return normalized;
            if (/UTC/.test(normalized)) return normalized;
        } catch (e) {
            // ignore and try next
        }
    }
    return '';
}

function formatInZone(now, tz) {
    const timeFormatter = new Intl.DateTimeFormat('zh-CN', {
        timeZone: tz,
        hour: '2-digit',
        minute: '2-digit',
        second: showSeconds ? '2-digit' : undefined,
        hour12: false
    });
    const dateFormatter = new Intl.DateTimeFormat('zh-CN', {
        timeZone: tz,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        weekday: 'short'
    });
    const partsTime = timeFormatter.format(now);
    const partsDate = dateFormatter.format(now);
    return { time: partsTime, date: partsDate };
}

async function copyText(text) {
    // Clipboard API works only in secure contexts (https/localhost). Provide a robust fallback.
    if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (!ok) throw new Error('copy-failed');
}

function buildCards() {
    const grid = document.getElementById('clockGrid');
    const safeFilter = filterText.trim().toLowerCase();

    const zones = ZONES.filter(z => {
        if (!safeFilter) return true;
        return (z.label + ' ' + z.tz).toLowerCase().includes(safeFilter);
    });

    if (zones.length === 0) {
        grid.innerHTML = `
            <div class="col-12">
                <div class="text-center text-muted py-5" style="background: #f8f9fc; border-radius: 18px;">
                    未找到匹配的时区
                </div>
            </div>
        `;
        return;
    }

    grid.innerHTML = zones.map((z, idx) => {
        const ok = supportsTimeZone(z.tz);
        const badge = ok
            ? `<span class="badge rounded-pill text-bg-light" style="border: 1px solid rgba(0,0,0,0.06);">IANA</span>`
            : `<span class="badge rounded-pill text-bg-warning">不支持</span>`;

        return `
            <div class="col-md-6">
                <div class="p-3" style="background: #f8f9fc; border-radius: 18px; border: 1px solid rgba(0,0,0,0.04);">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div>
                            <div class="fw-semibold" style="color: #1a2634;">${escapeHtml(z.label)}</div>
                            <div class="text-muted small d-flex align-items-center gap-2 flex-wrap">
                                <span>${escapeHtml(z.tz)}</span>
                                <span class="badge rounded-pill text-bg-light"
                                      data-offset="${escapeHtml(z.tz)}"
                                      style="border: 1px solid rgba(0,0,0,0.06);">
                                    --
                                </span>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            ${badge}
                            <button class="btn btn-sm btn-outline-secondary" data-copy="${escapeHtml(z.tz)}" title="复制时区标识">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mt-3 d-flex align-items-baseline justify-content-between">
                        <div>
                            <div class="clock-time fw-semibold" data-tz="${escapeHtml(z.tz)}" style="font-size: 1.7rem; letter-spacing: -0.3px; color: #1a2634;">
                                --
                            </div>
                            <div class="clock-date text-muted small" data-tz-date="${escapeHtml(z.tz)}">--</div>
                        </div>
                        <div class="text-muted small">
                            <span class="badge rounded-pill text-bg-light" style="border: 1px solid rgba(0,0,0,0.06);">
                                #${idx + 1}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    grid.querySelectorAll('button[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
            const tz = btn.getAttribute('data-copy');
            try {
                await copyText(tz);
                btn.innerHTML = '<i class="bi bi-check2"></i>';
                setTimeout(() => (btn.innerHTML = '<i class="bi bi-clipboard"></i>'), 900);
            } catch (e) {
                alert('复制失败，请手动复制：' + tz);
            }
        });
    });
}

function tick() {
    const now = new Date();

    // 本地时间
    const localTimeFmt = new Intl.DateTimeFormat('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        second: showSeconds ? '2-digit' : undefined,
        hour12: false
    }).format(now);
    const localDateFmt = new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        weekday: 'short'
    }).format(now);
    document.getElementById('localTime').innerText = localTimeFmt;
    document.getElementById('localDate').innerText = localDateFmt;

    // UTC 标准时间
    const utcTimeFmt = new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'UTC',
        hour: '2-digit',
        minute: '2-digit',
        second: showSeconds ? '2-digit' : undefined,
        hour12: false
    }).format(now);
    const utcDateFmt = new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'UTC',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        weekday: 'short'
    }).format(now);
    document.getElementById('utcTime').innerText = utcTimeFmt;
    document.getElementById('utcDate').innerText = utcDateFmt;

    // 各时区
    document.querySelectorAll('.clock-time[data-tz]').forEach(el => {
        const tz = el.getAttribute('data-tz');
        if (!supportsTimeZone(tz)) {
            el.innerText = '不支持';
            return;
        }
        el.innerText = formatInZone(now, tz).time;
    });
    document.querySelectorAll('.clock-date[data-tz-date]').forEach(el => {
        const tz = el.getAttribute('data-tz-date');
        if (!supportsTimeZone(tz)) {
            el.innerText = '';
            return;
        }
        el.innerText = formatInZone(now, tz).date;
    });

    // 偏移量（随夏令时变化）
    document.querySelectorAll('[data-offset]').forEach(el => {
        const tz = el.getAttribute('data-offset');
        if (!supportsTimeZone(tz)) {
            el.innerText = '';
            return;
        }
        const offsetLabel = tryGetOffsetLabel(now, tz);
        el.innerText = offsetLabel || '--';
    });
}

function start() {
    if (timer) clearInterval(timer);
    tick();
    timer = setInterval(tick, showSeconds ? 250 : 1000);
}

document.getElementById('filterInput').addEventListener('input', (e) => {
    filterText = e.target.value || '';
    buildCards();
    tick();
});

document.getElementById('toggleSecondsBtn').addEventListener('click', () => {
    showSeconds = !showSeconds;
    document.getElementById('toggleSecondsBtn').innerText = showSeconds ? '隐藏秒' : '显示秒';
    tick();
    start();
});

document.getElementById('resetBtn').addEventListener('click', () => {
    showSeconds = false;
    filterText = '';
    document.getElementById('toggleSecondsBtn').innerText = '显示秒';
    document.getElementById('filterInput').value = '';
    buildCards();
    start();
});

buildCards();
start();
</script>
{% endblock %}
