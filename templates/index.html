{% extends "base.html" %}
{% block title %}主页 · Ethan's Toolbox{% endblock %}
{% block content %}
<section class="hero">
    <h1>本地 · 极简 · 高效</h1>
    <p>不依赖云端，隐私优先，专为效率控打造的个人工具箱</p>
</section>

<div class="tool-grid">
    {% for tool in tools %}
    <a href="/tool/{{ tool.id }}" class="tool-card">
        <div class="card-content">
            <div class="icon-wrapper"><i class="bi {{ tool.icon }}"></i></div>
            <h5>{{ tool.name }}</h5>
            <p>{{ tool.description }}</p>
            <span class="btn-glow">立即使用</span>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
