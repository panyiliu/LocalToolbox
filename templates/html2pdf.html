{% extends "base.html" %}
{% block title %}{{ tool.name }} · Ethan's Toolbox{% endblock %}
{% block content %}
<div class="tb-page-wrap">
    <div class="tb-back"><a href="/"><i class="bi bi-arrow-left-short me-1"></i>返回所有工具</a></div>
    <div class="tb-panel p-4 p-md-5">
        <h2 class="tb-title mb-3">
            <i class="bi bi-file-earmark-pdf me-2 tb-heading-icon"></i>{{ tool.name }}
        </h2>
        <p class="text-muted mb-4">{{ tool.description }}</p>
        <form id="toolForm" enctype="multipart/form-data" data-api-url="/api/{{ tool.id }}">
            <div class="mb-4">
                <label for="html_file" class="form-label fw-medium">
                    <i class="bi bi-file-earmark-code me-1"></i>选择 HTML 文件
                </label>
                <input class="form-control" type="file" id="html_file" name="html_file" accept=".html,.htm" required>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="mode" class="form-label fw-medium">
                        <i class="bi bi-layout-text-window-reverse me-1"></i>导出模式
                    </label>
                    <select class="form-select" id="mode" name="mode">
                        <option value="single_page" selected>单页 PDF</option>
                        <option value="paged">正常分页 PDF</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="media" class="form-label fw-medium">
                        <i class="bi bi-palette me-1"></i>样式模式
                    </label>
                    <select class="form-select" id="media" name="media">
                        <option value="screen" selected>保留屏幕样式</option>
                        <option value="print">使用打印样式</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remove_outer_background" name="remove_outer_background" value="true" checked>
                        <label class="form-check-label" for="remove_outer_background">移除外层背景</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="print_background" name="print_background" value="true" checked>
                        <label class="form-check-label" for="print_background">保留背景图层</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="landscape" name="landscape" value="true">
                        <label class="form-check-label" for="landscape">横向页面</label>
                    </div>
                </div>
            </div>

            <div class="alert alert-light border mb-4" role="note">
                默认自动识别页面主体区域，无需填写选择器。特殊 HTML 若识别不到主体，会自动回退到整页导出。
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-5">
                    <i class="bi bi-play-circle me-1"></i>开始导出
                </button>
                <a href="/" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回主页
                </a>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/common.js') }}"></script>
<script src="{{ url_for('static', filename='js/html2pdf-page.js') }}"></script>
{% endblock %}
